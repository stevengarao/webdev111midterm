<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation | Luna Vista Resort</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="res-body">

    <header class="navbar static">
        <a href="login.html" class="logo">LUNA VISTA<span>RESORT</span></a>
        <nav>
            <ul class="nav-links">
                <li><a href="login.html">Home</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">About</a></li>
                <li><a href="index.html" class="active">Reservation</a></li>
            </ul>
        </nav>
    </header>

    <main class="res-container">
        <div class="res-grid">
            <section class="gallery-side">
                <div class="carousel-wrapper">
                    <div class="carousel">
                        <img src="pic1.jpg" class="slide active" alt="Room 1">
                        <img src="pic2.jpg" class="slide" alt="Room 2">
                        <img src="pic3.jpg" class="slide" alt="Room 3">
                        
                        <button class="carousel-btn prev">&#10094;</button>
                        <button class="carousel-btn next">&#10095;</button>
                    </div>
                    <div class="dots">
                        <span class="dot active"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>
            </section>

            <section class="form-side">
                <div class="form-header">
                    <h2>Reservation Form</h2>
                    <p>Secure your sun-kissed memories today.</p>
                </div>

                <form id="reservationForm" class="pro-form">
                    <div class="field">
                        <label>Full Name</label>
                        <input type="text" placeholder="Steven Garao" required>
                    </div>

                    <div class="two-col">
                        <div class="field">
                            <label>Email Address</label>
                            <input type="email" placeholder="sgarao@email.com" required>
                        </div>
                        <div class="field">
                            <label>Phone Number</label>
                            <input type="tel" placeholder="+63 912 345 6789" required>
                        </div>
                    </div>

                    <div class="two-col">
                        <div class="field">
                            <label>Check-In</label>
                            <input type="date" required>
                        </div>
                        <div class="field">
                            <label>Check-Out</label>
                            <input type="date" required>
                        </div>
                    </div>

                    <div class="two-col">
                        <div class="field">
                            <label>Guests</label>
                            <input type="number" min="1" max="12" value="1" required>
                        </div>
                        <div class="field">
                            <label>Room Type</label>
                            <select required>
                                <option value="">Choose a room...</option>
                                <option>Standard Garden View</option>
                                <option>Deluxe Ocean Suite</option>
                                <option>Presidential Villa</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" class="main-btn">Confirm My Stay</button>
                </form>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Luna Vista Resort. Steven Garao BSEMC 1-Y2-1.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
