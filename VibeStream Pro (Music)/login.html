<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PinkPop! Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page-bg">
    <div class="sparkle s1">✨</div>
    <div class="sparkle s2">🌸</div>
    <div class="sparkle s3">🎀</div>

    <div class="login-card">
        <div class="brand">
            <div class="logo-wrapper">
                <span class="logo-icon">🫧</span>
                <div class="aura"></div>
            </div>
            <h1>VibeStream<span>Pro</span></h1>
            <p class="tagline">Where every beat is a <span>sweet treat</span></p>
        </div>

        <form action="index.html">
            <div class="input-group">
                <input type="email" id="email" required placeholder=" ">
                <label for="email">💌 Sweet Email</label>
                <div class="focus-border"></div>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" required placeholder=" ">
                <label for="password">🍭 Candy Password</label>
                <div class="focus-border"></div>
            </div>
            
            <button type="submit" class="login-btn">
                <span>Pop In!</span>
                <div class="btn-shine"></div>
            </button>
        </form>
        <div class="footer-links">
            <a href="#">Forgot your frosting?</a>
        </div>
    </div>
</body>
</html>
