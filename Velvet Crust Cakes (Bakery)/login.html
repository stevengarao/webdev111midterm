<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Velvet Crust Cakes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container centered-card">
        <div class="logo" style="margin-bottom: 10px;">Velvet Crust</div>
        <h2 style="color: var(--cream); margin-bottom: 30px; font-size: 1.5rem;">Account Access</h2>
        
        <div class="input-group" style="margin-bottom: 20px;">
            <input type="email" placeholder="Email Address" style="width:90%; padding:15px; border-radius:20px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.1); color:white; font-family: 'Poppins', sans-serif;">
        </div>
        
        <div class="input-group" style="margin-bottom: 30px;">
            <input type="password" placeholder="Password" style="width:90%; padding:15px; border-radius:20px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.1); color:white; font-family: 'Poppins', sans-serif;">
        </div>
        
        <button class="btn-cream" style="width: 98%; padding: 15px; font-size: 1.1rem;">Sign In</button>
        
        <p style="margin-top: 30px;">
            <a href="index.html" style="color: var(--cream); text-decoration: none; opacity: 0.8; transition: 0.3s;">← Return to Home</a>
        </p>
    </div>
</body>
</html>
